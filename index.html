<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mijn Kunstwerken Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  color:#e0e0e0;
  line-height:1.6;
  background-image:url('images/background.jpg');
  background-size:2000px 800px;
  background-position:center;
  background-attachment:fixed;
  background-color:rgba(174,196,214,0.75);
  background-blend-mode:multiply;
}

.top-nav { background: rgba(20,20,35,0.55); backdrop-filter:blur(14px); padding:1rem 5vw; position:sticky; top:0; z-index:2000; border-bottom:1px solid rgba(212,175,55,0.35);}
.nav-container { max-width:1400px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; position:relative; }
.logo { color:#d4af37; font-size:1.8rem; font-weight:700; text-decoration:none; text-shadow:0 0 12px rgba(212,175,55,0.4);}
.nav-links a { color:#e0e0e0; margin:0 1.2rem; text-decoration:none; font-size:1.15rem;}
.nav-links a:hover, .nav-links a.active { color:#d4af37;}
.social-icons a { color:#e0e0e0; font-size:1.5rem; margin-left:1rem;}
#menu-toggle { display:none;}
.hamburger { display:none; flex-direction:column; gap:6px; cursor:pointer;}
.hamburger span { width:28px; height:3px; background:#d4af37; border-radius:3px;}
.mobile-menu { display:none !important;}
@media(max-width:800px){ .hamburger { display:flex;} .nav-links, .social-icons{display:none;} #menu-toggle:checked ~ .mobile-menu{display:flex !important;} .mobile-menu { flex-direction:column; position:absolute; top:100%; left:0; width:100%; background: rgba(26,26,46,0.97); padding:1.8rem 2rem; border-bottom:1px solid rgba(212,175,55,0.35); box-shadow:0 10px 30px rgba(0,0,0,0.6); z-index:1500;} .mobile-menu a{color:#e0e0e0;font-size:1.35rem;padding:0.8rem 0;text-decoration:none;} .mobile-menu a:hover{color:#d4af37;} .mobile-social { margin-top:1.2rem; display:flex; gap:1.4rem;} .mobile-social a{font-size:1.8rem; color:#e0e0e0;} .mobile-social a:hover{color:#d4af37;} }

header { text-align:center; padding:6rem 1rem 4rem; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);}
h1 { font-size:clamp(3rem,8vw,5.5rem); color:#d4af37; text-shadow:0 3px 12px rgba(0,0,0,0.8);}

.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:2.2rem; padding:2rem 5vw 4rem; max-width:1800px; margin:0 auto;}
figure { position:relative; overflow:hidden; border-radius:14px; background:#111; box-shadow:0 10px 35px rgba(0,0,0,0.7); transition:0.4s;}
figure:hover { transform:translateY(-14px);}
img { width:100%; aspect-ratio:4/5; object-fit:cover; transition:0.5s;}
figure:hover img { transform:scale(1.09);}
figcaption { padding:1.3rem 1.5rem; font-size:0.98rem; color:#ccc; background:linear-gradient(to top, rgba(0,0,0,0.85), transparent); position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center;}
.heart { font-size:1.6rem; cursor:pointer; color:#ccc; transition:0.3s;}
.heart.liked { color:#ff4d6d; transform:scale(1.2);}
.like-count { margin-left:6px; font-size:1.1rem; color:#d4af37; font-weight:600;}
.like-float { position:absolute; font-size:1.2rem; font-weight:bold; color:#d4af37; animation:floatUp 0.8s ease-out forwards; pointer-events:none; z-index:999;}
@keyframes floatUp {0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-25px) scale(1.4);}}
.like-count.bump { animation:bumpAnim 0.25s ease;}
@keyframes bumpAnim {0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:3000; align-items:center; justify-content:center; padding:1rem;}
.lightbox:target { display:flex;}
.lightbox img { max-width:100vw; max-height:100vh; width:auto; height:auto; object-fit:contain; border-radius:12px; box-shadow:0 0 70px rgba(212,175,55,0.35);}
.close { position:absolute; top:1.5rem; right:1.5rem; font-size:3rem; color:white; cursor:pointer;}
footer { text-align:center; padding:4rem 1rem 2rem; opacity:0.75; background: rgba(10,10,14,0.8);}
</style>
</head>

<body>

<nav class="top-nav">
<div class="nav-container">
<a href="index.html" class="logo">Kunst van Thibault P</a>
<input type="checkbox" id="menu-toggle">
<label for="menu-toggle" class="hamburger"><span></span><span></span><span></span></label>
<div class="nav-links">
<a href="index.html" class="active">Gallery</a>
<a href="about.html">Over mij</a>
</div>
<div class="social-icons">
<a href="https://www.instagram.com/polet_creations_/" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://www.tiktok.com/@polet_thibault" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://www.facebook.com/polet.creations/" target="_blank"><i class="fab fa-facebook"></i></a>
</div>
<div class="mobile-menu">
<a href="index.html">Gallery</a>
<a href="about.html">Over mij</a>
<div class="mobile-social">
<a href="https://www.instagram.com/polet_creations_/" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://www.tiktok.com/@polet_thibault" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://www.facebook.com/polet.creations/" target="_blank"><i class="fab fa-facebook"></i></a>
</div>
</div>
</div>
</nav>

<header>
<h1>Mijn Kunstwerken</h1>
<p>Klik op een werk voor een grotere weergave</p>
</header>

<main class="gallery">
<figure>
<a href="#img1"><img src="images/jelly1 (20221030121321).jpg"></a>
<figcaption>
Jelly Cocker spaniel - 2022
<span><span class="heart" data-id="jelly1">♡</span><span class="like-count" data-id="jelly1">0</span></span>
</figcaption>
</figure>

<figure>
<a href="#img2"><img src="images/Théodore (20221020050509).png"></a>
<figcaption>

<span><span class="heart" data-id="theodore">♡</span><span class="like-count" data-id="theodore">0</span></span>

<figure>

<footer>
<p>© 2026 — Thibault P</p>
</footer>

<script>
document.querySelectorAll('.heart').forEach(heart=>{
  const id = heart.dataset.id;
  const countEl = document.querySelector('.like-count[data-id="'+id+'"]');

  // Laad sessie-waarden
  const savedCount = parseInt(sessionStorage.getItem('likes_'+id)) || 0;
  const savedLiked = sessionStorage.getItem('liked_'+id) === 'true';

  if(savedLiked) heart.classList.add('liked');
  countEl.textContent = savedCount;

  heart.addEventListener('click', ()=>{
    const isLiked = heart.classList.toggle('liked');
    let count = parseInt(countEl.textContent);
    count += isLiked ? 1 : -1;

    countEl.textContent = count;

    // Opslaan in sessionStorage
    sessionStorage.setItem('likes_'+id,count);
    sessionStorage.setItem('liked_'+id,isLiked);

    // Pop animatie
    const float = document.createElement('span');
    float.classList.add('like-float');
    float.textContent = isLiked ? '+1' : '-1';
    const rect = heart.getBoundingClientRect();
    float.style.left = rect.left + rect.width/2 + 'px';
    float.style.top = rect.top - 5 + 'px';
    document.body.appendChild(float);
    setTimeout(()=>float.remove(),800);

    countEl.classList.add('bump');
    setTimeout(()=>countEl.classList.remove('bump'),250);
  });
});
</script>

</body>
</html>
