<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mijn Kunstwerken Gallery</title>
  
  <!-- Font Awesome voor social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;

      background-image: url('images/background.jpg');
      background-size: 2000px 800px;
      background-position: center;
      background-attachment: fixed;
      background-repeat: auto;

      background-color: rgba(174, 196, 214, 0.75);
      background-blend-mode: multiply;
    }

    /* === LUXE GLASSMORPHISM MENU === */
    .top-nav {
      background: rgba(20, 20, 35, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 1rem 5vw;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(212,175,55,0.35);
      box-shadow: 0 4px 25px rgba(0,0,0,0.6);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #d4af37;
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(212,175,55,0.4);
    }

    .nav-links a {
      color: #e0e0e0;
      margin: 0 1.2rem;
      text-decoration: none;
      font-size: 1.15rem;
      transition: 0.3s;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #d4af37;
    }

    .social-icons a {
      color: #e0e0e0;
      font-size: 1.5rem;
      margin-left: 1rem;
      transition: 0.3s;
    }

    .social-icons a:hover {
      color: #d4af37;
      transform: scale(1.15);
    }

    /* Mobiel menu */
    #menu-toggle {
      display: none;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 6px;
    }

    .hamburger span {
      width: 28px;
      height: 3px;
      background: #d4af37;
      border-radius: 3px;
    }

    @media (max-width: 800px) {
      .hamburger {
        display: flex;
      }

      .nav-links,
      .social-icons {
        display: none;
      }

      #menu-toggle:checked ~ .nav-links,
      #menu-toggle:checked ~ .social-icons {
        display: flex;
        flex-direction: column;
        background: rgba(26,26,46,0.95);
        padding: 1.5rem;
        position: absolute;
        top: 100%;
        right: 5vw;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      }

      .nav-links a {
        margin: 0.8rem 0;
        font-size: 1.3rem;
      }

      .social-icons a {
        margin: 0.5rem 0;
      }
    }

    /* === HEADER === */
    header {
      text-align: center;
      padding: 6rem 1rem 4rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      color: #d4af37;
      margin-bottom: 0.6rem;
      text-shadow: 0 3px 12px rgba(0,0,0,0.8);
    }

    header p {
      font-size: 1.35rem;
      opacity: 0.9;
      max-width: 680px;
      margin: 0 auto;
    }

    /* === GALLERY === */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2.2rem;
      padding: 2rem 5vw 4rem;
      max-width: 1800px;
      margin: 0 auto;
    }

    figure {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: #111;
      box-shadow: 0 10px 35px rgba(0,0,0,0.7);
      transition: all 0.4s ease;
    }

    figure:hover {
      transform: translateY(-14px);
      box-shadow: 0 22px 55px rgba(212,175,55,0.28);
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    figure:hover img {
      transform: scale(1.09);
    }

    figcaption {
      padding: 1.3rem 1.5rem;
      font-size: 0.98rem;
      color: #ccc;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      transition: background 0.4s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    figure:hover figcaption {
      background: linear-gradient(to top, rgba(211, 207, 150, 0.92), rgba(0,0,0,0.5));
    }

    /* ❤️ Hartjes */
    .heart {
      font-size: 1.6rem;
      cursor: pointer;
      color: #ccc;
      transition: 0.3s ease;
      user-select: none;
    }

    .heart.liked {
      color: #ff4d6d;
      text-shadow: 0 0 10px rgba(255, 77, 109, 0.6);
      transform: scale(1.2);
    }

    /* === LIGHTBOX === */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: auto;
    }

    .lightbox:target {
      display: flex;
    }

    .lightbox .close-area {
      position: absolute;
      inset: 0;
      z-index: 1;
      cursor: pointer;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 70px rgba(212,175,55,0.35);
      z-index: 2;
    }

    .close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 3.8rem;
      height: 3.8rem;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 3rem;
      line-height: 3.8rem;
      text-align: center;
      border-radius: 50%;
      z-index: 10;
      cursor: pointer;
      transition: all 0.25s;
    }

    .close:hover {
      background: #d4af37;
      transform: scale(1.12);
    }

    footer {
      text-align: center;
      padding: 4rem 1rem 2rem;
      font-size: 0.95rem;
      opacity: 0.75;
      border-top: 1px solid #222;
      background: rgba(10,10,14,0.8);
    }

    footer a {
      color: #d4af37;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- NAVIGATIE -->
  <nav class="top-nav">
    <div class="nav-container">

      <a href="index.html" class="logo">Kunst van Thibault P</a>

      <input type="checkbox" id="menu-toggle">
      <label for="menu-toggle" class="hamburger">
        <span></span><span></span><span></span>
      </label>

      <div class="nav-links">
        <a href="index.html" class="active">Gallery</a>
        <a href="about.html">Over mij</a>
      </div>

      <div class="social-icons">
        <a href="https://www.instagram.com/polet_creations_/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@polet_thibault" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.facebook.com/polet.creations/" target="_blank"><i class="fab fa-facebook"></i></a>
      </div>

    </div>
  </nav>

  <header>
    <h1>Mijn Kunstwerken</h1>

  </header>

  <main class="gallery">

    <figure>

    <figure>

      <figcaption>
        Théodore - Cavia - 2022 - Paint Art Virtual

      </figcaption>
    </figure>

    <figure>
      <a href="#img3"><img src="images/Princesse (20221013080117).jpg" alt="Princesse - Cavia"></a>
      <figcaption>
        Princesse - Cavia - 2022 - Paint Art Virtual
        <span class="heart">♡</span>
      </figcaption>
    </figure>

    <figure>
      <a href="#img4"><img src="images/Project (20221027055049).jpg" alt="Zonsondergang"></a>

        Zon ondergang met zeilboot - 2022 - Paint Art Virtual
        <span class="heart">♡</span>

  <!-- LIGHTBOXES -->

  <footer>
    <p>© 2026 - Tekening Atelier Polet Thibault P • <a href="#">GitHub</a></p>
  </footer>

  <!-- ❤️ Hartjes script -->
  <script>
    document.querySelectorAll('.heart').forEach(heart => {
      heart.addEventListener('click', () => {
        heart.classList.toggle('liked');
      });
    });
  </script>

</body>
</html>
