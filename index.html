<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Kunstwerken Gallery</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui, sans-serif; color:#e0e0e0; line-height:1.6; background:#111; }

/* NAVIGATIE */
.top-nav { background: rgba(20,20,35,0.55); padding:1rem 5vw; position:sticky; top:0; z-index:2000; display:flex; justify-content:space-between; align-items:center; }
.logo { color:#d4af37; font-size:1.8rem; font-weight:700; text-decoration:none; text-shadow:0 0 12px rgba(212,175,55,0.4); }
.nav-links a { color:#e0e0e0; margin:0 1rem; text-decoration:none; font-size:1.15rem; }
.nav-links a:hover, .nav-links a.active { color:#d4af37; }
.social-icons a { color:#e0e0e0; font-size:1.5rem; margin-left:1rem; }

/* MOBIEL MENU */
#menu-toggle { display:none; }
.hamburger { display:none; flex-direction:column; gap:6px; cursor:pointer; }
.hamburger span { width:28px; height:3px; background:#d4af37; border-radius:3px; }
.mobile-menu { display:none !important; }
@media(max-width:800px){
  .hamburger { display:flex; }
  .nav-links, .social-icons { display:none; }
  #menu-toggle:checked ~ .mobile-menu { display:flex !important; }
  .mobile-menu { flex-direction:column; position:absolute; top:100%; left:0; width:100%; background:rgba(26,26,46,0.97); padding:1.5rem; z-index:1500; }
  .mobile-menu a { font-size:1.35rem; padding:0.8rem 0; color:#e0e0e0; text-decoration:none; }
  .mobile-menu a:hover { color:#d4af37; }
  .mobile-social { display:flex; gap:1.4rem; margin-top:1rem; }
  .mobile-social a { font-size:1.8rem; color:#e0e0e0; }
  .mobile-social a:hover { color:#d4af37; }
}

/* HEADER */
header { text-align:center; padding:4rem 1rem; }
h1 { font-size:clamp(3rem,8vw,5.5rem); color:#d4af37; text-shadow:0 3px 12px rgba(0,0,0,0.8); }

/* GALLERY */
.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:2rem; padding:2rem 5vw; }
figure { position:relative; overflow:hidden; border-radius:14px; background:#111; transition:0.4s; }
figure:hover { transform:translateY(-10px); }
img { width:100%; aspect-ratio:4/5; object-fit:cover; transition:0.5s; }
figure:hover img { transform:scale(1.08); }
figcaption { padding:1rem; font-size:0.95rem; color:#ccc; background:linear-gradient(to top, rgba(0,0,0,0.85), transparent); position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; }

/* HARTJES */
.heart { font-size:1.6rem; cursor:pointer; color:#ccc; transition:0.3s; }
.heart.liked { color:#ff4d6d; transform:scale(1.2); }
.like-count { margin-left:0.5rem; font-size:1.1rem; color:#d4af37; font-weight:600; }
.like-float { position:absolute; font-size:1.2rem; font-weight:bold; color:#d4af37; animation:floatUp 0.8s ease-out forwards; pointer-events:none; z-index:999; }
@keyframes floatUp { 0% {opacity:1; transform:translateY(0) scale(1);} 100% {opacity:0; transform:translateY(-25px) scale(1.4);} }
.like-count.bump { animation:bumpAnim 0.25s ease; }
@keyframes bumpAnim { 0% {transform:scale(1);} 50% {transform:scale(1.35);} 100% {transform:scale(1);} }

/* LIGHTBOX */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:3000; align-items:center; justify-content:center; padding:1rem; }
.lightbox:target { display:flex; }
.lightbox img { max-width:100vw; max-height:100vh; object-fit:contain; border-radius:12px; box-shadow:0 0 70px rgba(212,175,55,0.35); }
.close { position:absolute; top:1.5rem; right:1.5rem; font-size:3rem; color:white; cursor:pointer; }

/* FOOTER */
footer { text-align:center; padding:2rem 1rem; opacity:0.75; background: rgba(10,10,14,0.8); }
</style>
</head>

<body>

<!-- NAVIGATIE -->
<nav class="top-nav">
  <a href="#" class="logo">Kunst van Thibault P</a>
  <input type="checkbox" id="menu-toggle">
  <label for="menu-toggle" class="hamburger"><span></span><span></span><span></span></label>
  <div class="nav-links">
    <a href="#" class="active">Gallery</a>
    <a href="#">Over mij</a>
  </div>
  <div class="social-icons">
    <a href="https://www.instagram.com/polet_creations_/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.tiktok.com/@polet_thibault" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="https://www.facebook.com/polet.creations/" target="_blank"><i class="fab fa-facebook"></i></a>
  </div>

  <div class="mobile-menu">
    <a href="#">Gallery</a>
    <a href="#">Over mij</a>
    <div class="mobile-social">
      <a href="https://www.instagram.com/polet_creations_/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@polet_thibault" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://www.facebook.com/polet.creations/" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
  </div>
</nav>

<header>
  <h1>Mijn Kunstwerken</h1>
  <p>Klik op een werk voor een grotere weergave en klik op het hartje om te liken</p>
</header>

<main class="gallery">
  <figure>
    <a href="#img1"><img src="images/jelly1.jpg" alt="Jelly"></a>
    <figcaption>
      Jelly Cocker Spaniel
      <span><span class="heart" data-id="jelly1">♡</span><span class="like-count" data-id="jelly1">0</span></span>
    </figcaption>
  </figure>

  <figure>
    <a href="#img2"><img src="images/theodore.png" alt="Théodore"></a>
    <figcaption>
      Théodore - Cavia
      <span><span class="heart" data-id="theodore">♡</span><span class="like-count" data-id="theodore">0</span></span>
    </figcaption>
  </figure>

  <figure>
    <a href="#img3"><img src="images/princesse.jpg" alt="Princesse"></a>
    <figcaption>
      Princesse - Cavia
      <span><span class="heart" data-id="princesse">♡</span><span class="like-count" data-id="princesse">0</span></span>
    </figcaption>
  </figure>
</main>

<!-- LIGHTBOXES -->
<div class="lightbox" id="img1"><a href="#" class="close">×</a><img src="images/jelly1.jpg"></div>
<div class="lightbox" id="img2"><a href="#" class="close">×</a><img src="images/theodore.png"></div>
<div class="lightbox" id="img3"><a href="#" class="close">×</a><img src="images/princesse.jpg"></div>

<footer>
  <p>© 2026 — Thibault P</p>
</footer>

<!-- HARTJES + GSHEET SYNCHRONISATIE -->
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbx6kvGm6d3JTNnCnPwR5TUFEWCCn_GPVuchGeULD2i6L3pLs1BzXhrMyP7rgZS-I1L2fg/exec"; // <-- Vervang YOUR_SHEET_ID

document.querySelectorAll('.heart').forEach(heart=>{
  const id = heart.dataset.id;
  const countEl = document.querySelector(`.like-count[data-id="${id}"]`);

  // teller ophalen
  fetch(`${scriptURL}?id=${id}`)
    .then(res=>res.text())
    .then(count=>{
      countEl.textContent = count;
      if(parseInt(count)>0) heart.classList.add('liked');
    });

  // klik event
  heart.addEventListener('click', ()=>{
    fetch(`${scriptURL}?id=${id}`, { method:"POST" })
      .then(res=>res.text())
      .then(count=>{
        countEl.textContent = count;
        heart.classList.add('liked');

        const float = document.createElement('span');
        float.classList.add('like-float');
        float.textContent = "+1";

        const rect = heart.getBoundingClientRect();
        float.style.left = rect.left + rect.width/2 + 'px';
        float.style.top = rect.top - 5 + 'px';

        document.body.appendChild(float);
        setTimeout(()=>float.remove(),800);

        countEl.classList.add('bump');
        setTimeout(()=>countEl.classList.remove('bump'),250);
      })
      .catch(err=>console.error("POST error:", err));
  });
});
</script>

</body>
</html>
