<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mijn Kunstwerken</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
color:#e0e0e0;
background:#0f0f16;
}

/* NAV */

nav{
background:#161624;
padding:1rem 5vw;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#d4af37;
font-size:1.6rem;
font-weight:bold;
text-decoration:none;
}

.nav-links a{
margin-left:1rem;
color:#ddd;
text-decoration:none;
}

header{
text-align:center;
padding:3rem 1rem;
}

h1{
font-size:3rem;
color:#d4af37;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:2rem;
padding:2rem 5vw;
}

figure{
position:relative;
overflow:hidden;
border-radius:12px;
background:#111;
}

img{
width:100%;
height:100%;
object-fit:cover;
}

/* CAPTION */

figcaption{
position:absolute;
bottom:0;
left:0;
right:0;
background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
padding:1rem;
display:flex;
justify-content:space-between;
align-items:center;
}

/* HEART */

.heart{
font-size:1.5rem;
cursor:pointer;
color:#ccc;
}

.heart.liked{
color:#ff4d6d;
}

.like-count{
margin-left:5px;
color:#d4af37;
}

/* LIGHTBOX */

.lightbox{
display:none;
position:fixed;
inset:0;
background:black;
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox:target{
display:flex;
}

.lightbox img{
max-width:95%;
max-height:95%;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:3rem;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<nav>

<a class="logo" href="#">Kunst van Thibault</a>

<div class="nav-links">
<a href="#">Gallery</a>
<a href="#">Over mij</a>
</div>

</nav>

<header>

<h1>Mijn Kunstwerken</h1>
<p>Klik op een werk voor vergroting</p>

</header>

<main class="gallery">

<figure>

<a href="#img1">
<img src="images/jelly1.jpg" loading="lazy">
</a>

<figcaption>

Jelly Cocker spaniel

<span>
<span class="heart" data-id="jelly1">♡</span>
<span class="like-count" data-id="jelly1">0</span>
</span>

</figcaption>

</figure>

<figure>

<a href="#img2">
<img src="images/theodore.png" loading="lazy">
</a>

<figcaption>

Théodore Cavia

<span>
<span class="heart" data-id="theodore">♡</span>
<span class="like-count" data-id="theodore">0</span>
</span>

</figcaption>

</figure>

<figure>

<a href="#img3">
<img src="images/princesse.jpg" loading="lazy">
</a>

<figcaption>

Princesse

<span>
<span class="heart" data-id="princesse">♡</span>
<span class="like-count" data-id="princesse">0</span>
</span>

</figcaption>

</figure>

</main>

<!-- LIGHTBOX -->

<div class="lightbox" id="img1">
<a href="#" class="close">×</a>
<img src="images/jelly1.jpg">
</div>

<div class="lightbox" id="img2">
<a href="#" class="close">×</a>
<img src="images/theodore.png">
</div>

<div class="lightbox" id="img3">
<a href="#" class="close">×</a>
<img src="images/princesse.jpg">
</div>

<footer style="text-align:center;padding:2rem;">
© 2026 — Thibault P
</footer>

<script>

/* GOOGLE SHEET API */

const API = "https://script.google.com/macros/s/AKfycbyEsSIyP2z5VvK3So4p4AeuObw-yjXJqxJhyMInnyVsUbl1PaFXsgkaM_tViXAaiDhSyw/exec"


/* LOAD LIKES */

fetch(API)

.then(res=>res.json())

.then(data=>{

document.querySelectorAll('.like-count').forEach(el=>{

const id = el.dataset.id

if(data[id]){
el.textContent = data[id]
}

})

})


/* CLICK HEART */

document.querySelectorAll('.heart').forEach(heart=>{

heart.addEventListener('click',()=>{

const id = heart.dataset.id

fetch(API,{

method:'POST',

body:new URLSearchParams({
id:id
})

})

.then(res=>res.text())

.then(count=>{

document.querySelector('.like-count[data-id="'+id+'"]').textContent = count

})

heart.classList.toggle('liked')

})

})


/* ESC CLOSE LIGHTBOX */

document.addEventListener("keydown",e=>{

if(e.key==="Escape"){
location.hash=""
}

})

</script>

</body>
</html>
